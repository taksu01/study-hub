name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build -w bitcoin-study
      - run: npm run build -w invest-study
      - run: npm run build -w math-speeed

      - name: Assemble output
        run: |
          mkdir output
          touch output/.nojekyll
          cp landing/index.html output/index.html
          mkdir -p output/bitcoin-study output/invest-study output/math-speeed
          cp -r apps/bitcoin-study/dist/* output/bitcoin-study/
          cp -r apps/invest-study/dist/* output/invest-study/
          cp -r apps/math-speeed/dist/* output/math-speeed/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - id: deployment
        uses: actions/deploy-pages@v4
